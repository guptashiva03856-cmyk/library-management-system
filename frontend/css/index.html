<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-book-reader"></i>
            <span>LibMaster</span>
        </div>
        <ul class="nav-links">
            <li class="nav-item active" data-target="books">
                <i class="fas fa-book"></i>
                <span>Books</span>
            </li>
            <li class="nav-item" data-target="authors">
                <i class="fas fa-pen-nib"></i>
                <span>Authors</span>
            </li>
            <li class="nav-item" data-target="members">
                <i class="fas fa-users"></i>
                <span>Members</span>
            </li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header>
            <h2 class="page-title" id="page-title">Books Management</h2>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Search...">
            </div>
            <div class="user-profile">
                <div class="avatar">A</div>
                <span>Admin User</span>
            </div>
        </header>

        <!-- Content Area -->
        <div class="content-area" id="content-area">
            <!-- Stats Row -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(99, 102, 241, 0.1); color: var(--primary-color);">
                        <i class="fas fa-book"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="total-count">0</h3>
                        <p>Total Items</p>
                    </div>
                </div>
                <!-- Chart Card -->
                <div class="chart-card">
                    <canvas id="main-chart"></canvas>
                </div>
            </div>

            <!-- Data Table Section -->
            <div class="data-section">
                <div class="section-header">
                    <h3>All Items</h3>
                    <button class="btn-primary" id="add-btn">
                        <i class="fas fa-plus"></i> Add New
                    </button>
                </div>
                <div class="table-container">
                    <table id="data-table">
                        <thead>
                            <!-- Headers will be injected here -->
                        </thead>
                        <tbody>
                            <!-- Rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Add New Item</h3>
                <button class="close-modal" id="close-modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="data-form">
                <input type="hidden" id="item-id">
                <div id="form-fields">
                    <!-- Dynamic fields -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="cancel-modal">Cancel</button>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-message">Operation successful</span>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
